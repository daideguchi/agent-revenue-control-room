<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent Revenue Control Room Architecture</title>
  <desc id="desc">AI agent runs become evidence, cost, approval, Qwen review, and action logs. Alibaba Function Compute hosts the safe backend proof endpoint.</desc>
  <rect width="1200" height="720" fill="#f6f7f4"/>
  <text x="60" y="70" fill="#162123" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Agent Revenue Control Room</text>
  <text x="60" y="104" fill="#52615e" font-family="Inter, Arial, sans-serif" font-size="18">A human-controlled workflow for AI agents doing revenue work</text>

  <g font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="60" y="160" width="220" height="100" rx="8" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="90" y="205" fill="#162123">AI Agent Run</text>
    <text x="90" y="232" fill="#52615e" font-size="14" font-weight="500">write, deploy, sell, publish</text>

    <rect x="360" y="135" width="300" height="150" rx="8" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="392" y="178" fill="#162123">Control Room</text>
    <text x="392" y="210" fill="#52615e" font-size="14" font-weight="500">evidence ledger</text>
    <text x="392" y="235" fill="#52615e" font-size="14" font-weight="500">cost guard</text>
    <text x="392" y="260" fill="#52615e" font-size="14" font-weight="500">human approval gate</text>

    <rect x="760" y="110" width="320" height="96" rx="8" fill="#fff7ed" stroke="#f0b36d"/>
    <text x="792" y="151" fill="#162123">Qwen Cloud</text>
    <text x="792" y="178" fill="#52615e" font-size="14" font-weight="500">bounded review packet</text>

    <rect x="760" y="250" width="320" height="96" rx="8" fill="#edf8f3" stroke="#83c2a2"/>
    <text x="792" y="291" fill="#162123">Alibaba Function Compute</text>
    <text x="792" y="318" fill="#52615e" font-size="14" font-weight="500">public safe backend proof</text>

    <rect x="360" y="410" width="300" height="110" rx="8" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="392" y="454" fill="#162123">Human Decision</text>
    <text x="392" y="482" fill="#52615e" font-size="14" font-weight="500">approve, ask for proof, or stop</text>

    <rect x="760" y="410" width="320" height="110" rx="8" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="792" y="454" fill="#162123">Action Log</text>
    <text x="792" y="482" fill="#52615e" font-size="14" font-weight="500">clean handoff for humans and AI</text>
  </g>

  <g stroke="#52615e" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M280 210 H350"/>
    <path d="M660 178 H748"/>
    <path d="M660 245 C710 245 710 298 748 298"/>
    <path d="M510 286 V398"/>
    <path d="M660 465 H748"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#52615e"/>
    </marker>
  </defs>

  <rect x="60" y="590" width="1020" height="74" rx="8" fill="#162123"/>
  <text x="92" y="625" fill="#e7f6f0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Claim boundary</text>
  <text x="92" y="650" fill="#b7c9c1" font-family="Inter, Arial, sans-serif" font-size="15">Qwen live use is proven by a local backend smoke test. The public Alibaba endpoint is deployed without a Qwen key for safe proof.</text>
</svg>
